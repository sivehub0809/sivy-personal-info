<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eang Siv Y</title>
  <meta
    name="description"
    content="Eang Siv Y is a Cambodian startup founder, AI engineer, and web developer building Nilaa."
  >
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+Khmer:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page" id="top">
    <header class="site-header">
      <div class="brand-row">
        <a class="brand" href="#top" aria-label="Go to top">
          <img class="brand-icon" src="assets/logo.jpg" alt="Capybara website icon">
          <span class="brand-name">siv y</span>
        </a>
        <div class="language-switcher" aria-label="Language switcher">
          <button class="lang-button is-active" data-lang="en" type="button">EN</button>
          <button class="lang-button" data-lang="km" type="button">KH</button>
          <button class="lang-button" data-lang="zh" type="button">ZH</button>
          <button class="lang-button" data-lang="ja" type="button">JA</button>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="hero-copy">
        <h1 id="hero-heading"></h1>
        <p id="hero-intro" class="hero-intro"></p>
      </div>
      <div class="hero-avatar">
        <a class="avatar-link" href="https://www.linkedin.com/in/eang-siv-y" target="_blank" rel="noreferrer" aria-label="Open Eang Siv Y LinkedIn profile">
          <img class="avatar-image" src="assets/profile.jpg" alt="Portrait of Eang Siv Y">
        </a>
      </div>
    </section>

    <section class="section-block">
      <h2 id="journey-heading"></h2>
      <p id="journey-copy" class="section-copy"></p>
    </section>

    <section class="section-block" id="experience">
      <h2 id="experience-heading"></h2>
      <div id="experience-list" class="timeline-list"></div>
    </section>

    <section class="section-block" id="education">
      <h2 id="education-heading"></h2>
      <div id="education-list" class="timeline-list"></div>
    </section>

    <section class="section-block contact-section" id="contact">
      <span id="contact-tag" class="section-tag"></span>
      <h2 id="contact-heading" class="contact-heading"></h2>
      <p id="contact-copy" class="contact-copy"></p>
      <div class="contact-actions">
        <a class="essay-button" href="essays.html" id="essay-link"></a>
      </div>
      <div id="contact-links" class="contact-links"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
