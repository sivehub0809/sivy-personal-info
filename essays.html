<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essays | Eang Siv Y</title>
  <meta name="description" content="Essays and writing by Eang Siv Y.">
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #6d6d6d;
      --line: #e9e9e9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "Segoe UI", sans-serif;
    }

    .page {
      width: min(100%, 620px);
      margin: 0 auto;
      padding: 2rem 1.1rem 4rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      color: inherit;
      text-decoration: none;
      font-weight: 700;
      margin-bottom: 2rem;
    }

    .brand img {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 3rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0.9rem 0 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 1rem;
    }

    @media (max-width: 560px) {
      .page {
        padding: 1.25rem 0.95rem 3rem;
      }

      p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="brand" href="index.html">
      <img src="assets/logo.jpg" alt="Capybara website icon">
      <span>siv y</span>
    </a>
    <h1>Essays coming soon.</h1>
    <p>This page is ready for your future blogs, notes, and long-form writing.</p>
  </main>
</body>
</html>
